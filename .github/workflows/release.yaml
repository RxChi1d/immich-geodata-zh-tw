name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '請輸入語意化版本標籤 (例如: v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*' # 語意化版本標籤，例如 v1.0.0、v1.0.0a1

defaults:
  run:
    shell: bash

jobs:
  release:
    environment: Action Env
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      # 手動觸發時使用輸入值，否則使用推送的 tag 名稱
      VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
    steps:
      - name: 驗證版本標籤 (PEP 440)
        run: |
          echo "驗證 VERSION_TAG: ${VERSION_TAG}"
          # 允許格式：vMAJOR.MINOR.PATCH 或 vMAJOR.MINOR.PATCHaN/bN/rcN（PEP 440 預發布版本）
          REGEX='^v[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$'
          if [[ ! "$VERSION_TAG" =~ $REGEX ]]; then
            echo "❌ 無效的 VERSION_TAG: $VERSION_TAG"
            echo "預期格式 (PEP 440): vMAJOR.MINOR.PATCH 或 vMAJOR.MINOR.PATCHaN/bN/rcN"
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Set current date as env variable
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Build
        run: uv run python main.py release --locationiq-api-key "${{ secrets.LOCATIONIQ_API_KEY }}" --country-code "KR" "TH"
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.VERSION_TAG }}
          artifacts: |
            output/release.*
            LICENSE
            update_data.sh
          draft: false
          generateReleaseNotes: false
          commit: main
          tag: ${{ env.VERSION_TAG }}
          # 僅穩定版本標記為 latest；含預發布標識（a/b/rc/alpha/beta）的標記為 prerelease
          makeLatest: ${{ !contains(env.VERSION_TAG, 'a') && !contains(env.VERSION_TAG, 'b') && !contains(env.VERSION_TAG, 'rc') && !contains(env.VERSION_TAG, 'alpha') && !contains(env.VERSION_TAG, 'beta') }}
          prerelease: ${{ contains(env.VERSION_TAG, 'a') || contains(env.VERSION_TAG, 'b') || contains(env.VERSION_TAG, 'rc') || contains(env.VERSION_TAG, 'alpha') || contains(env.VERSION_TAG, 'beta') }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        id: auto-commit
        with:
          branch: chore/update-meta-data-${{ env.TODAY }}
          create_branch: true
          commit_message: Auto update reverse geocoding data on ${{ env.TODAY }}
          file_pattern: meta_data/*
      - name: Create PR for meta_data
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/update-meta-data-${{ env.TODAY }}"
          existing=$(gh pr list --head "$branch" --state open --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(geodata): 發布後更新 meta_data ${{ env.TODAY }}" \
              --body "這是 release 流程產生的 meta_data 更新，請審核後合併。"
          else
            echo "已有開啟中的 PR，跳過建立。"
          fi
