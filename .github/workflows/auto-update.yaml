name: Auto Update

on:
  workflow_dispatch:
  schedule:
    - cron: "33 3 * * 5"

defaults:
  run:
    shell: bash

jobs:
  auto-update:
    environment: Action Env
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Create nightly branch
        run: git checkout -B nightly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Set current date as env variable
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Build
        run: uv run python main.py release --locationiq-api-key "${{ secrets.LOCATIONIQ_API_KEY }}" --country-code "KR" "TH"
      - uses: stefanzweifel/git-auto-commit-action@v5
        id: auto-commit
        with:
          branch: nightly
          commit_message: Auto update reverse geocoding data on ${{ env.TODAY }}
          file_pattern: meta_data/*
          push_options: '--force'
      - name: Delete existing nightly release
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: Automated Nightly Build ${{ env.TODAY }}
          artifacts: "output/release.*"
          body: |
            這是定期自動生成的 nightly 版本 (包含最新 geodata)，可能未經充分測試。建議使用標有 "Latest" 的穩定版本。
            如果發現問題請提 issue 並暫時選擇到 [此處](https://github.com/RxChi1d/immich-geodata-zh-tw/releases) 選擇手動發布的 Release 文件。
            如果遇到 Immich 沒有更新數據，請手動修改 geodata-date.txt 文件，將其內容中的時間修改為更新的時間（比如當前時間）。
          draft: false
          generateReleaseNotes: false
          commit: nightly
          tag: nightly
          makeLatest: false
          prerelease: true
      - name: Create PR to main
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head nightly --state open --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --base main \
              --head nightly \
              --title "chore(geodata): 自動更新 ${{ env.TODAY }}" \
              --body "這是 nightly 自動更新產生的 geodata 變更，請審核後合併。"
          else
            echo "已有開啟中的 PR，跳過建立。"
          fi
